#!/usr/bin/env bash
# pi.conf — Raspberry Pi deployment configuration.
#
# Sourced by pi-setup.sh, pi-update.sh, and pi-health.sh.
# After changing values, re-run: sudo bash /opt/goodmorning/pi/pi-setup.sh
#
# RAM budget at these defaults (estimated):
#   OS + compositor:  ~500 MB
#   Chromium:         ~800 MB  (single tab, varies with content)
#   Gunicorn (1w):    ~130 MB
#   APScheduler:      ~90 MB
#   Audio (pipewire): ~60 MB
#   Total:           ~1.6 GB  → leaves ~2.4 GB for OVOS + Hailo workloads

# ── Database ────────────────────────────────────────────────────────
# sqlite:   Zero overhead, WAL mode, ideal for single-user dashboard.
#           All data is API cache that auto-rebuilds within an hour.
# postgres: Native install via apt, 128 MB shared_buffers. Use only if
#           you need concurrent writers or Postgres-specific features.
GM_DATABASE=sqlite

# ── Gunicorn workers ────────────────────────────────────────────────
# 1: Saves ~100 MB. Fine for single-user kiosk (all requests are local).
# 2: Better for concurrent requests (original default).
GM_WORKERS=1

# ── Desktop services ────────────────────────────────────────────────
# full: Panel, file manager, on-screen keyboard (stock Pi OS desktop).
# lean: Compositor + Chromium only. Saves ~130 MB.
GM_DESKTOP=lean

# ── VNC remote access ──────────────────────────────────────────────
# on:  wayvnc runs for remote desktop access (~43 MB).
# off: SSH-only remote access. Use if you have physical access.
GM_VNC=off
