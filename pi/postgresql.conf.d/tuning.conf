# PostgreSQL tuning for Raspberry Pi 5 (4 GB RAM)
# Drop this into /etc/postgresql/16/main/conf.d/

shared_buffers = 128MB
work_mem = 4MB
effective_cache_size = 512MB
maintenance_work_mem = 64MB

# WAL / checkpoint tuning
wal_buffers = 4MB
checkpoint_completion_target = 0.9
min_wal_size = 40MB
max_wal_size = 200MB

# Connection limits (only gunicorn + scheduler connect)
max_connections = 20

# Logging
log_min_duration_statement = 500
